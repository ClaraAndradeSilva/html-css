<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
    <h1> Exemplo de Formulário</h1>
<form action="cadastro.php" method="post" autocomplete="on">
  
  <p>
    <label for="iano"> Em que ano tu nasceu? </label>
    <input type="number" name="ano" id="iano" oninput="calcIdade()" > 
  </p>

  <p>
    <label for="iidade"> Sua idade é: </label>
    <output id="iidade">0</output>
  </p>
  
  <p>
    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">
  </p>

  <script>
    function calcIdade() {
      let atual = new Date().getFullYear() 
      iidade.innerHTML = Number(atual) - Number(iano.value)
    }
  </script>

<source media="(min-width: 20px )" srcset="">
</body>
</html>
