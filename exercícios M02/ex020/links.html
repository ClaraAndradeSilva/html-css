<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links</title>
  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
    }

    a{ color: rgb(109, 83, 134);
    }
    a:visited{ 
      color: crimson;
    }

    a::before{
     content: '(yes)';
     text-decoration: none;
     font-weight: normal;
     color: black;
    }
    
    
  </style>
</head>
<body>
  <h1>Personalizando links</h1>
  <li>

      Youtube
    </a>
  </li>
  <li> 
    <a href="https://www.youtube.com/@felipeneto" target="_blank" rel="external">
     Canal do youtube
    </a>
  </li>
  <li>
    <a href="https://www.youtube.com/watch?v=QjOpsGkLbYI&pp=ugUHEgVwdC1QVA%3D%3D" target="_blank" rel="external">
      Vídeo de setup
    </a>

</html>
