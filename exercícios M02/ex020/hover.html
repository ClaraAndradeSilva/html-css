<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>éé</title>
  <style>
    body{ font-family: Arial, Helvetica, sans-serif;
    }

    div > p {
      display: none;
    }

    div:hover > p{ 
      display: block;
      color: aqua;
      background-color: chocolate;
      width: 375px;
    }

    div:hover{
      color: red;
    }
  </style>
</head>
<body>
  <h1>Exemplo de hover</h1>
  <p>Passe o mouse aqui sobre o texto</p>
  <div>
    Passe o mouse aqui
    <p>texto escondido...</p>
  </div>
  <p>Fim do exemplo</p>
</body>
</html>
